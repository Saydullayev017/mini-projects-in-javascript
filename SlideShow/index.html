<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SlideShow</title>
</head>
<body>
    
    <div class="container">
        <div class="mySlides fade">
            <img src="img1.jpg" alt="Миямото Мусаси белым фоне">
            <div class="text">Мусаси-кэндо. В 16 лет я покинул родной дом. Я назвал себя Мусаси. Я стал ронином — самураем без господина.</div>
        </div>
        
        <div class="mySlides fade">
            <img src="img2.jpg" alt="Миямото Мусаси">
            <div class="text">В возрасте 20–29 лет я провел более 60 поединков. Я ни разу не проиграл. </div>
        </div>
    </div>

    <br>

    <div class="dot-con">
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <script src="script.js"></script>
</body>
</html>
