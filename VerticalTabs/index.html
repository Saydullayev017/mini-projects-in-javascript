<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Вкладки Tab</title>
</head>
<body>

<!-- Блок с кнопками-вкладками -->
<div class="tab">
  <!-- Каждая кнопка вызывает функцию openCity при клике, передавая событие и название города -->
  <button class="tablinks" onclick="openCity(event, 'London')">London</button>
  <button class="tablinks" onclick="openCity(event, 'Paris')">Paris</button>
  <button class="tablinks" onclick="openCity(event, 'Tokyo')">Tokyo</button>
</div>

<!-- Содержимое вкладки для Лондона. Изначально видимо, так как не скрыто CSS -->
<div id="London" class="tabcontent">
  <h3>London</h3>
  <p>London is the capital city of England.</p>
</div>

<!-- Содержимое вкладки для Парижа -->
<div id="Paris" class="tabcontent">
  <h3>Paris</h3>
  <p>Paris is the capital of France.</p>
</div>

<!-- Содержимое вкладки для Токио -->
<div id="Tokyo" class="tabcontent">
  <h3>Tokyo</h3>
  <p>Tokyo is the capital of Japan.</p>
</div>

<script src="script.js"></script>
</body>
</html>
